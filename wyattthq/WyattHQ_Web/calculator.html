<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calorie System | Wyatt HQ</title>
  <link rel="stylesheet" href="css/Cstyle.css" />
</head>
<body>

  <header class="navbar">
    <div class="logo">WYATT<span>HQ</span></div>

    <nav>
      <a href="index.html">Home</a>
      <a href="calculator.html" class="active">Calorie System</a>
      <a href="sale.html">For Sale</a>
      <a class="nav-link social-link" href="https://www.instagram.com/wyattt.hq/" target="_blank" rel="noreferrer">INSTAGRAM ↗</a>
      <a class="nav-link social-link" href="https://www.tiktok.com/@wyattt.hq" target="_blank" rel="noreferrer">TIKTOK ↗</a>
    </nav>
  </header>

  <main class="calculator-page">

    <section class="calculator-hero">
      <div>
        <p class="system-label">SYSTEM WINDOW</p>
        <h1>Macro Calculator</h1>
        <p>
          Choose your goal and macro style. This system gives you daily calories,
          protein, carbs, and fat to help you rank up.
        </p>
      </div>
    </section>

    <section class="calculator-box">

      <div class="form-grid">

        <div class="form-control">
          <label>Age</label>
          <input type="number" id="age" value="32" />
        </div>

        <div class="form-control">
          <label>Gender</label>
          <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>

        <div class="form-control">
          <label>Height Feet</label>
          <input type="number" id="feet" value="5" />
        </div>

        <div class="form-control">
          <label>Height Inches</label>
          <input type="number" id="inches" value="10" />
        </div>

        <div class="form-control">
          <label>Weight Pounds</label>
          <input type="number" id="weight" value="165" />
        </div>

        <div class="form-control">
          <label>Activity Level</label>
          <select id="activity">
            <option value="1.2">Little exercise</option>
            <option value="1.375">Light exercise 1-3 days/week</option>
            <option value="1.55" selected>Moderate exercise 4-5 days/week</option>
            <option value="1.725">Hard exercise 6-7 days/week</option>
            <option value="1.9">Very hard exercise</option>
          </select>
        </div>

        <div class="form-control">
          <label>Goal</label>
          <select id="goal">
            <option value="maintain">Maintain Weight</option>
            <option value="cut" selected>Cut Fat</option>
            <option value="bulk">Lean Bulk</option>
          </select>
        </div>

      </div>

      <button class="calculate-btn" onclick="calculateCalories()">Calculate</button>

      <div class="result-box">

        <h2>Result</h2>

        <div class="calorie-result">
          <p>Daily Calories</p>
          <h3 id="caloriesResult">---</h3>
        </div>

        <div class="macro-tabs">
          <button class="macro-tab active" onclick="changeMacro('balanced', this)">Balanced</button>
          <button class="macro-tab" onclick="changeMacro('lowFat', this)">Low Fat</button>
          <button class="macro-tab" onclick="changeMacro('lowCarb', this)">Low Carb</button>
          <button class="macro-tab" onclick="changeMacro('highProtein', this)">High Protein</button>
        </div>

        <div class="macro-results">

          <div class="macro-card">
            <span>Protein</span>
            <strong id="proteinResult">---</strong>
            <small>grams/day</small>
          </div>

          <div class="macro-card">
            <span>Carbs</span>
            <strong id="carbsResult">---</strong>
            <small>grams/day</small>
          </div>

          <div class="macro-card">
            <span>Fat</span>
            <strong id="fatResult">---</strong>
            <small>grams/day</small>
          </div>

        </div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
